name: Bump big-parental-controls

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest tag matching big-parental-controls-<version>-*-x86_64
          LATEST_TAG=$(gh api repos/biglinux/big-parental-controls/tags \
            --jq '[.[] | select(.name | test("^big-parental-controls-[0-9]+(\\.[0-9]+)+-.*-x86_64$"))] | first | .name')

          if [ -z "$LATEST_TAG" ]; then
            echo "No matching tag found"
            exit 1
          fi

          # Extract semantic version from tag (e.g. big-parental-controls-26.04.02-0200-x86_64 -> 26.04.02)
          NEW_VERSION=$(echo "$LATEST_TAG" | grep -oP '^big-parental-controls-\K\d+\.\d+\.\d+')

          if [ -z "$NEW_VERSION" ]; then
            echo "Could not extract version from tag: $LATEST_TAG"
            exit 1
          fi

          NEW_URL="https://github.com/biglinux/big-parental-controls/archive/refs/tags/${LATEST_TAG}.tar.gz"

          CURRENT_URL=$(grep -oP '(?<=url ")[^"]+' Formula/big-parental-controls.rb)
          CURRENT_VERSION=$(grep -oP '(?<=version ")\d+\.\d+\.\d+' Formula/big-parental-controls.rb)

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_url=$CURRENT_URL"          >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION"          >> "$GITHUB_OUTPUT"
          echo "new_url=$NEW_URL"                  >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG"            >> "$GITHUB_OUTPUT"

          if [ "$NEW_URL" != "$CURRENT_URL" ]; then
            echo "needs_update=true"  >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download tarball and compute SHA-256
        if: steps.check.outputs.needs_update == 'true'
        id: hash
        run: |
          NEW_SHA256=$(curl -fsSL "${{ steps.check.outputs.new_url }}" | sha256sum | cut -d' ' -f1)
          echo "new_sha256=$NEW_SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.check.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.check.outputs.new_version }}"
          NEW_URL="${{ steps.check.outputs.new_url }}"
          NEW_SHA256="${{ steps.hash.outputs.new_sha256 }}"

          sed -i "s|url \"[^\"]*\"|url \"$NEW_URL\"|"      Formula/big-parental-controls.rb
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"$NEW_SHA256\"|" Formula/big-parental-controls.rb
          sed -i "s|version \"[^\"]*\"|version \"$NEW_VERSION\"|" Formula/big-parental-controls.rb

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "big-parental-controls ${{ steps.check.outputs.new_version }}"
          title: "big-parental-controls ${{ steps.check.outputs.new_version }}"
          body: |
            Bumps **big-parental-controls** from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.

            | Field | Value |
            |-------|-------|
            | New tag | `${{ steps.check.outputs.latest_tag }}` |
            | New URL | ${{ steps.check.outputs.new_url }} |

            ---
            *This PR was created automatically by the [Bump big-parental-controls](${{ github.server_url }}/${{ github.repository }}/actions/workflows/bump-big-parental-controls.yml) workflow.*
          branch: "bump/big-parental-controls-${{ steps.check.outputs.new_version }}"
          delete-branch: true
          labels: automated-pr
